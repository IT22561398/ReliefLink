version: '3.8'

services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: relieflink-postgres-auth
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-secure_auth_password}
      POSTGRES_DB: auth_service_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - relieflink
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  postgres-request:
    image: postgres:16-alpine
    container_name: relieflink-postgres-request
    environment:
      POSTGRES_USER: request_user
      POSTGRES_PASSWORD: ${REQUEST_DB_PASSWORD:-secure_request_password}
      POSTGRES_DB: request_service_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_request_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U request_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - relieflink
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  postgres-volunteer:
    image: postgres:16-alpine
    container_name: relieflink-postgres-volunteer
    environment:
      POSTGRES_USER: volunteer_user
      POSTGRES_PASSWORD: ${VOLUNTEER_DB_PASSWORD:-secure_volunteer_password}
      POSTGRES_DB: volunteer_service_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_volunteer_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volunteer_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - relieflink
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  postgres-notification:
    image: postgres:16-alpine
    container_name: relieflink-postgres-notification
    environment:
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-secure_notification_password}
      POSTGRES_DB: notification_service_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - relieflink
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: relieflink-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secure_redis_password}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secure_redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - relieflink
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  config-service:
    build:
      context: .
      dockerfile: services/config-service/Dockerfile
    container_name: relieflink-config-service
    environment:
      NODE_ENV: production
      CONFIG_SERVICE_PORT: 3006
      AUTH_SERVICE_URL: http://auth-service:3001
      REQUEST_SERVICE_URL: http://request-service:3004
      VOLUNTEER_SERVICE_URL: http://volunteer-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3002
      API_GATEWAY_URL: http://api-gateway:3005
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3005}
      CONFIG_SERVICE_TOKEN: ${CONFIG_SERVICE_TOKEN:-}
    ports:
      - "3006:3006"
    networks:
      - relieflink
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: relieflink-auth-service
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 24h
      AUTH_DATABASE_URL: postgresql://auth_user:${AUTH_DB_PASSWORD:-secure_auth_password}@postgres-auth:5432/auth_service_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-secure_redis_password}@redis:6379
      VOLUNTEER_SERVICE_URL: http://volunteer-service:3003
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - relieflink
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Request Service
  request-service:
    build:
      context: .
      dockerfile: services/request-service/Dockerfile
    container_name: relieflink-request-service
    environment:
      NODE_ENV: production
      PORT: 3004
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      REQUEST_DATABASE_URL: postgresql://request_user:${REQUEST_DB_PASSWORD:-secure_request_password}@postgres-request:5432/request_service_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-secure_redis_password}@redis:6379
      AUTH_SERVICE_URL: http://auth-service:3001
      NOTIFICATION_SERVICE_URL: http://notification-service:3002
      LOG_LEVEL: info
    ports:
      - "3004:3004"
    depends_on:
      postgres-request:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - relieflink
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Volunteer Service
  volunteer-service:
    build:
      context: .
      dockerfile: services/volunteer-service/Dockerfile
    container_name: relieflink-volunteer-service
    environment:
      NODE_ENV: production
      PORT: 3003
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      VOLUNTEER_DATABASE_URL: postgresql://volunteer_user:${VOLUNTEER_DB_PASSWORD:-secure_volunteer_password}@postgres-volunteer:5432/volunteer_service_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-secure_redis_password}@redis:6379
      AUTH_SERVICE_URL: http://auth-service:3001
      REQUEST_SERVICE_URL: http://request-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3002
      LOG_LEVEL: info
    ports:
      - "3003:3003"
    depends_on:
      postgres-volunteer:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - relieflink
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: relieflink-notification-service
    environment:
      NODE_ENV: production
      PORT: 3002
      NOTIFICATION_DATABASE_URL: postgresql://notification_user:${NOTIFICATION_DB_PASSWORD:-secure_notification_password}@postgres-notification:5432/notification_service_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-secure_redis_password}@redis:6379
      LOG_LEVEL: info
    ports:
      - "3002:3002"
    depends_on:
      postgres-notification:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - relieflink
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: relieflink-api-gateway
    environment:
      NODE_ENV: production
      API_GATEWAY_PORT: 3005
      AUTH_SERVICE_URL: http://auth-service:3001
      REQUEST_SERVICE_URL: http://request-service:3004
      VOLUNTEER_SERVICE_URL: http://volunteer-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3002
      CONFIG_SERVICE_URL: http://config-service:3006
      CONFIG_SERVICE_TOKEN: ${CONFIG_SERVICE_TOKEN:-}
      CORS_ORIGIN: ${WEB_PUBLIC_ORIGIN:-http://localhost:3000}
      CORS_CREDENTIALS: "true"
      LOG_LEVEL: info
    ports:
      - "3005:3005"
    depends_on:
      auth-service:
        condition: service_healthy
      request-service:
        condition: service_healthy
      volunteer-service:
        condition: service_healthy
      notification-service:
        condition: service_started
      config-service:
        condition: service_healthy
    networks:
      - relieflink
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3005}
    container_name: relieflink-web
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3005}
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - relieflink
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_auth_data:
    driver: local
  postgres_request_data:
    driver: local
  postgres_volunteer_data:
    driver: local
  postgres_notification_data:
    driver: local
  redis_data:
    driver: local

networks:
  relieflink:
    driver: bridge
