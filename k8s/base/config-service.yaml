apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: relieflink
  labels:
    app: config-service
spec:
  selector:
    app: config-service
  ports:
    - port: 3006
      targetPort: 3006
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: relieflink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      containers:
      - name: config-service
        image: 489109585253.dkr.ecr.ap-south-1.amazonaws.com/relieflink-config-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3006
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: NODE_ENV
        - name: CONFIG_SERVICE_PORT
          value: "3006"
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: AUTH_SERVICE_URL
        - name: REQUEST_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: REQUEST_SERVICE_URL
        - name: VOLUNTEER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: VOLUNTEER_SERVICE_URL
        - name: NOTIFICATION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: NOTIFICATION_SERVICE_URL
        - name: API_GATEWAY_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: API_GATEWAY_URL
        - name: NEXT_PUBLIC_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: NEXT_PUBLIC_API_BASE_URL
        livenessProbe:
          httpGet:
            path: /health
            port: 3006
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3006
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: config-service-hpa
  namespace: relieflink
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: config-service
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
