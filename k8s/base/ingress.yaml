apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: relieflink-ingress
  namespace: relieflink
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 3005
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service
            port:
              number: 3000
