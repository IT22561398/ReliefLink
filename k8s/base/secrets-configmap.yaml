apiVersion: v1
kind: Secret
metadata:
  name: relieflink-secrets
  namespace: relieflink
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production-use-strong-secret"
  AUTH_DB_PASSWORD: "auth_secure_password_change_me"
  REQUEST_DB_PASSWORD: "request_secure_password_change_me"
  VOLUNTEER_DB_PASSWORD: "volunteer_secure_password_change_me"
  NOTIFICATION_DB_PASSWORD: "notification_secure_password_change_me"
  REDIS_PASSWORD: "redis_secure_password_change_me"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: relieflink-config
  namespace: relieflink
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  AUTH_SERVICE_URL: "http://auth-service:3001"
  REQUEST_SERVICE_URL: "http://request-service:3004"
  VOLUNTEER_SERVICE_URL: "http://volunteer-service:3003"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3002"
