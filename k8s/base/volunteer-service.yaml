apiVersion: v1
kind: Service
metadata:
  name: volunteer-service
  namespace: relieflink
  labels:
    app: volunteer-service
spec:
  selector:
    app: volunteer-service
  ports:
    - port: 3003
      targetPort: 3003
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: volunteer-service
  namespace: relieflink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: volunteer-service
  template:
    metadata:
      labels:
        app: volunteer-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - volunteer-service
              topologyKey: kubernetes.io/hostname
      initContainers:
      - name: migrate
        image: 489109585253.dkr.ecr.ap-south-1.amazonaws.com/relieflink-volunteer-service:latest
        imagePullPolicy: Always
        command: ["sh", "-c", "until nc -z postgres-0.postgres 5432; do echo waiting for postgres; sleep 2; done; ./node_modules/.bin/prisma migrate deploy --schema=prisma/schema.prisma"]
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: relieflink-secrets
              key: POSTGRES_PASSWORD
        - name: VOLUNTEER_DATABASE_URL
          value: "postgresql://postgres:$(DB_PASSWORD)@postgres-0.postgres:5432/volunteer_service_db"
      containers:
      - name: volunteer-service
        image: 489109585253.dkr.ecr.ap-south-1.amazonaws.com/relieflink-volunteer-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3003
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: NODE_ENV
        - name: PORT
          value: "3003"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: relieflink-secrets
              key: JWT_SECRET
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: LOG_LEVEL
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: relieflink-secrets
              key: POSTGRES_PASSWORD
        - name: VOLUNTEER_DATABASE_URL
          value: "postgresql://postgres:$(DB_PASSWORD)@postgres-0.postgres:5432/volunteer_service_db"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: relieflink-secrets
              key: REDIS_PASSWORD
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis-0.redis:6379"
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: AUTH_SERVICE_URL
        - name: REQUEST_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: REQUEST_SERVICE_URL
        - name: NOTIFICATION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: NOTIFICATION_SERVICE_URL
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "384Mi"
            cpu: "300m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: volunteer-service-hpa
  namespace: relieflink
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: volunteer-service
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
