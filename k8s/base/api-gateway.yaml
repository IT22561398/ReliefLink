apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: relieflink
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3005
      targetPort: 3005
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: relieflink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: 489109585253.dkr.ecr.ap-south-1.amazonaws.com/relieflink-api-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3005
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: NODE_ENV
        - name: API_GATEWAY_PORT
          value: "3005"
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: LOG_LEVEL
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: AUTH_SERVICE_URL
        - name: REQUEST_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: REQUEST_SERVICE_URL
        - name: VOLUNTEER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: VOLUNTEER_SERVICE_URL
        - name: NOTIFICATION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: NOTIFICATION_SERVICE_URL
        - name: CONFIG_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: CONFIG_SERVICE_URL
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: WEB_PUBLIC_ORIGIN
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3005
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3005
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "384Mi"
            cpu: "300m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: relieflink
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
