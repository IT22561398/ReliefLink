apiVersion: v1
kind: Service
metadata:
  name: request-service
  namespace: relieflink
  labels:
    app: request-service
spec:
  selector:
    app: request-service
  ports:
    - port: 3004
      targetPort: 3004
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: request-service
  namespace: relieflink
spec:
  replicas: 3
  selector:
    matchLabels:
      app: request-service
  template:
    metadata:
      labels:
        app: request-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - request-service
              topologyKey: kubernetes.io/hostname
      containers:
      - name: request-service
        image: request-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3004
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: NODE_ENV
        - name: PORT
          value: "3004"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: relieflink-secrets
              key: JWT_SECRET
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: LOG_LEVEL
        - name: DATABASE_URL
          value: "postgresql://request_user:$(DB_PASSWORD)@postgres-0.postgres:5432/request_service_db"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: relieflink-secrets
              key: REQUEST_DB_PASSWORD
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis-0.redis:6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: relieflink-secrets
              key: REDIS_PASSWORD
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: relieflink-config
              key: AUTH_SERVICE_URL
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: request-service-hpa
  namespace: relieflink
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: request-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
