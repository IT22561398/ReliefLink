name: Deploy to AWS EKS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY_PREFIX: ${{ secrets.AWS_ECR_REPOSITORY_PREFIX }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_STAGING }} \
            --region ${{ env.AWS_REGION }}

      - name: Create namespace
        run: |
          kubectl create namespace relieflink --dry-run=client -o yaml | kubectl apply -f -

      - name: Create secrets
        run: |
          kubectl create secret generic relieflink-secrets \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=AUTH_DB_PASSWORD=${{ secrets.AUTH_DB_PASSWORD }} \
            --from-literal=REQUEST_DB_PASSWORD=${{ secrets.REQUEST_DB_PASSWORD }} \
            --from-literal=VOLUNTEER_DB_PASSWORD=${{ secrets.VOLUNTEER_DB_PASSWORD }} \
            --from-literal=NOTIFICATION_DB_PASSWORD=${{ secrets.NOTIFICATION_DB_PASSWORD }} \
            --from-literal=REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            -n relieflink \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image references in manifests
        run: |
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          cd k8s/base
          for service in api-gateway auth-service request-service volunteer-service notification-service; do
            sed -i "s|image: $service:latest|image: ${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}-$service:${{ github.sha }}|g" *service.yaml
            sed -i "s|image: $service:latest|image: ${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}-$service:${{ github.sha }}|g" api-gateway.yaml
          done

      - name: Deploy to EKS
        run: |
          kubectl apply -k k8s/base/ -n relieflink

      - name: Wait for rollout
        run: |
          for service in api-gateway auth-service request-service volunteer-service notification-service; do
            kubectl rollout status deployment/$service -n relieflink --timeout=5m
          done

      - name: Verify deployment
        run: |
          echo "=== Pods Status ==="
          kubectl get pods -n relieflink

          echo "=== Services ==="
          kubectl get svc -n relieflink
