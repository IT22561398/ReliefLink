name: Deploy to AWS EKS

on:
  workflow_run:
    workflows: ["Build & Deploy Services"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY_PREFIX: ${{ secrets.AWS_ECR_REPOSITORY_PREFIX }}
  IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_STAGING }} \
            --region ${{ env.AWS_REGION }}

      - name: Verify EKS authentication
        run: |
          aws sts get-caller-identity
          kubectl config current-context
          kubectl auth can-i get namespaces

      - name: Create namespace
        run: |
          kubectl create namespace relieflink --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Create secrets
        run: |
          kubectl create secret generic relieflink-secrets \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=AUTH_DB_PASSWORD=${{ secrets.AUTH_DB_PASSWORD }} \
            --from-literal=REQUEST_DB_PASSWORD=${{ secrets.REQUEST_DB_PASSWORD }} \
            --from-literal=VOLUNTEER_DB_PASSWORD=${{ secrets.VOLUNTEER_DB_PASSWORD }} \
            --from-literal=NOTIFICATION_DB_PASSWORD=${{ secrets.NOTIFICATION_DB_PASSWORD }} \
            --from-literal=REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            -n relieflink \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image references in manifests
        run: |
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          cd k8s/base
          sed -i -E "s|image: .*/${ECR_REPOSITORY_PREFIX}-api-gateway:[^[:space:]]+|image: ${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}-api-gateway:${IMAGE_TAG}|g" api-gateway.yaml
          sed -i -E "s|image: .*/${ECR_REPOSITORY_PREFIX}-auth-service:[^[:space:]]+|image: ${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}-auth-service:${IMAGE_TAG}|g" auth-service.yaml
          sed -i -E "s|image: .*/${ECR_REPOSITORY_PREFIX}-request-service:[^[:space:]]+|image: ${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}-request-service:${IMAGE_TAG}|g" request-service.yaml
          sed -i -E "s|image: .*/${ECR_REPOSITORY_PREFIX}-volunteer-service:[^[:space:]]+|image: ${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}-volunteer-service:${IMAGE_TAG}|g" volunteer-service.yaml
          sed -i -E "s|image: .*/${ECR_REPOSITORY_PREFIX}-notification-service:[^[:space:]]+|image: ${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}-notification-service:${IMAGE_TAG}|g" notification-service.yaml
          sed -i -E "s|image: .*/${ECR_REPOSITORY_PREFIX}-web:[^[:space:]]+|image: ${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}-web:${IMAGE_TAG}|g" web-service.yaml

      - name: Deploy to EKS
        run: |
          kubectl apply -k k8s/base/ -n relieflink

      - name: Wait for rollout
        run: |
          for service in api-gateway auth-service request-service volunteer-service notification-service web-service; do
            kubectl rollout status deployment/$service -n relieflink --timeout=5m
          done

      - name: Verify deployment
        run: |
          echo "=== Pods Status ==="
          kubectl get pods -n relieflink

          echo "=== Services ==="
          kubectl get svc -n relieflink
